name: Analyze @immobiliarelabs/backstage-plugin-gitlab Compromised Package (Phantom Gyp)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.17.0
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download compromised tarball (npm pack does NOT run install scripts)
        run: |
          mkdir -p packages
          cd packages
          # `npm pack` only fetches + repacks the tarball; binding.gyp/node-gyp does
          # NOT fire here. This job is safe collection for archival/static analysis.
          npm pack @immobiliarelabs/backstage-plugin-gitlab@2.1.2 || true
          ls -la ./

  install-compromised-package:
    runs-on: ubuntu-latest
    needs: download-package
    timeout-minutes: 12
    steps:
      - name: Harden Runner
        uses: h0x0er/harden-runner@int-pr3
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detonate - install @immobiliarelabs/backstage-plugin-gitlab@2.1.2 (binding.gyp fires via node-gyp)
        continue-on-error: true
        run: |
          mkdir -p victim-project && cd victim-project
          npm init -y
          # Installation triggers the payload through the Phantom Gyp path:
          # binding.gyp sources uses `<!(node index.js > /dev/null 2>&1 && echo stub.c)`
          # which executes the 5MB AES-encrypted + ROT-2 obfuscated index.js payload.
          npm install @immobiliarelabs/backstage-plugin-gitlab@2.1.2 --foreground-scripts 2>&1 || true

      - name: Import package to trigger any runtime payload
        continue-on-error: true
        env:
          BUN_CONFIG_VERBOSE_FETCH: "true"
        run: |
          cd victim-project
          BUN_CONFIG_VERBOSE_FETCH=true node -e "try { require('@immobiliarelabs/backstage-plugin-gitlab'); } catch(e) { console.log('Import error:', e.message); }" 2>&1 || true

      - name: Wait for malware network activity
        run: |
          echo "Waiting 30 seconds for staged network activity (AES-decrypted C2, exfil)..."
          echo "Harden-Runner audit will record every outbound connection."
          sleep 30
